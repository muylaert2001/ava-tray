<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AVA</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#020b18;--navy2:#061428;--gold:#c9a84c;--gold2:#e8c870;--golddim:#7a5e28;--blue:#1a4a8a;--text:#d4e4f7;--textdim:#6a8aaa}
body{background:var(--navy);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;height:100vh;overflow:hidden}
.app{display:grid;grid-template-columns:190px 1fr 200px;grid-template-rows:auto 1fr;height:100vh}
.header{grid-column:1/-1;display:flex;align-items:center;gap:10px;padding:8px 16px;background:var(--navy2);border-bottom:1px solid rgba(201,168,76,.2);flex-shrink:0}
.nname{font-size:16px;font-weight:700;letter-spacing:.22em;color:var(--gold2)}
.nsub{font-size:8px;color:var(--golddim);letter-spacing:.18em;font-family:monospace;margin-top:1px}
.hright{margin-left:auto;display:flex;align-items:center;gap:8px}
.sdot{width:7px;height:7px;border-radius:50%;background:#34d399;box-shadow:0 0 5px #34d399}
.slbl{font-size:9px;font-family:monospace;letter-spacing:.14em;color:#34d399}
.spill{font-size:8px;font-family:monospace;padding:2px 6px;border-radius:3px;border:1px solid var(--golddim);color:var(--golddim)}
.spill.ok{color:var(--gold);border-color:rgba(201,168,76,.4);background:rgba(201,168,76,.06)}
.sleft{background:var(--navy2);border-right:1px solid rgba(201,168,76,.12);display:flex;flex-direction:column;overflow:hidden}
.ssec{padding:10px;border-bottom:1px solid rgba(201,168,76,.08);overflow-y:auto}
.ssec.g{flex:1}
.ssec.s{max-height:130px}
.sslbl{font-size:8px;font-family:monospace;letter-spacing:.18em;color:var(--golddim);margin-bottom:7px}
.ti{display:flex;align-items:flex-start;gap:6px;padding:4px 0;border-bottom:1px solid rgba(201,168,76,.05)}
.ti:last-child{border-bottom:none}
.tck{width:12px;height:12px;border:1px solid var(--golddim);border-radius:2px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:8px;cursor:pointer}
.tck.done{background:rgba(201,168,76,.2);border-color:var(--gold);color:var(--gold)}
.ttx{font-size:10px;color:var(--text);line-height:1.4;flex:1}
.ttx.done{color:var(--textdim);text-decoration:line-through}
.tpr{font-size:7px;font-family:monospace;padding:1px 3px;border-radius:2px;flex-shrink:0}
.tpr.h{background:rgba(248,113,113,.1);color:#f87171;border:1px solid rgba(248,113,113,.2)}
.tpr.m{background:rgba(201,168,76,.1);color:var(--gold);border:1px solid rgba(201,168,76,.2)}
.tpr.l{background:rgba(52,211,153,.1);color:#34d399;border:1px solid rgba(52,211,153,.2)}
.addbtn{width:100%;padding:4px;background:rgba(201,168,76,.05);border:1px dashed var(--golddim);border-radius:3px;color:var(--golddim);font-size:9px;font-family:monospace;cursor:pointer;text-align:center;margin-top:6px}
.addbtn:hover{border-color:var(--gold);color:var(--gold)}
.mi{font-size:9px;color:var(--textdim);padding:2px 0;border-bottom:1px solid rgba(201,168,76,.04);line-height:1.4;font-family:monospace}
.mi b{color:var(--gold);font-weight:normal}
.center{display:flex;flex-direction:column;background:var(--navy);overflow:hidden}
.owrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative}
.portrait{position:relative;height:min(calc(34vh / .49),calc(51% / .49));aspect-ratio:.54;animation:breathe 4.6s ease-in-out infinite;transform-origin:50% 100%}
.portrait.waking{animation:wakeLift .9s cubic-bezier(.2,.8,.3,1) 1}
.pcrop{position:absolute;inset:0;overflow:hidden;background:transparent}
.ptilt{position:absolute;inset:0;transition:transform .9s ease;transform:rotate(var(--tilt,0deg)) scale(var(--pscale,1))}
.portrait .pimgwrap{position:absolute;inset:0;overflow:hidden;animation:hairsway 7.5s ease-in-out infinite;transform-origin:50% 15%}
.portrait .pimg{display:block;width:100%;height:100%;object-fit:cover;object-position:var(--ox,50%) center;filter:brightness(var(--pb,.92)) saturate(var(--ps,1));transition:object-position 1.1s ease,filter 1.1s ease}
.portrait.waking .pimg{--pb:1.18}
.ptint{position:absolute;inset:0;pointer-events:none;z-index:1;background:var(--tint,rgba(70,130,230,.22));transition:background 1s ease}
.portrait.pst-thinking{--tilt:-2deg;--ox:42%;--pb:.8;--ps:1.05;--tint:rgba(90,60,225,.34)}
.portrait.pst-speaking{--tilt:0deg;--ox:50%;--pb:1.12;--ps:1.1;--pscale:1.02;--tint:rgba(255,205,110,.3)}
.portrait.pst-listening{--tilt:1deg;--ox:53%;--pb:1.05;--ps:1;--tint:rgba(232,190,90,.3)}
.pglow{position:absolute;inset:-32px;pointer-events:none;z-index:2;animation:glow-idle 2.6s ease-in-out infinite}
.portrait.pst-thinking .pglow{animation:glow-thinking 1.9s ease-in-out infinite}
.portrait.pst-speaking .pglow{animation:glow-speaking 2.2s ease-in-out infinite}
.portrait.pst-listening .pglow{animation:glow-listening 1.2s ease-in-out infinite}
.pblink{position:absolute;left:23%;top:39.5%;width:54%;height:9.5%;border-radius:50%;background:radial-gradient(ellipse at center,rgba(3,4,8,.97) 45%,rgba(3,4,8,0) 78%);opacity:0;pointer-events:none;z-index:3;transform:scaleY(.1);transform-origin:center}
.pblink.on{animation:blink .32s ease-in-out}
@keyframes breathe{0%,100%{transform:scale(1) translateY(0)}50%{transform:scale(1.012) translateY(-3px)}}
@keyframes hairsway{0%,100%{transform:scale(1.8) rotate(0deg) translateX(0)}50%{transform:scale(1.8) rotate(.5deg) translateX(1px)}}
@keyframes wakeLift{0%{transform:translateY(6px) scale(.99)}60%{transform:translateY(-4px) scale(1.01)}100%{transform:translateY(0) scale(1)}}
@keyframes blink{0%{opacity:0;transform:scaleY(.1)}45%{opacity:1;transform:scaleY(1.05)}60%{opacity:1;transform:scaleY(1.05)}100%{opacity:0;transform:scaleY(.1)}}
@keyframes glow-idle{0%,100%{box-shadow:0 0 20px 6px rgba(120,175,255,.6),0 0 46px 16px rgba(80,140,255,.5),0 0 90px 30px rgba(50,110,220,.32)}50%{box-shadow:0 0 30px 10px rgba(120,175,255,.85),0 0 64px 22px rgba(80,140,255,.7),0 0 118px 40px rgba(50,110,220,.46)}}
@keyframes glow-thinking{0%,100%{box-shadow:0 0 24px 8px rgba(150,190,255,.7),0 0 54px 20px rgba(100,160,255,.6),0 0 104px 36px rgba(90,60,225,.4)}50%{box-shadow:0 0 36px 13px rgba(150,190,255,.95),0 0 76px 27px rgba(100,160,255,.85),0 0 136px 46px rgba(90,60,225,.55)}}
@keyframes glow-speaking{0%,100%{box-shadow:0 0 28px 10px rgba(255,235,190,.75),0 0 60px 22px rgba(255,205,110,.6),0 0 112px 38px rgba(232,180,90,.4)}50%{box-shadow:0 0 38px 14px rgba(255,235,190,.95),0 0 80px 28px rgba(255,205,110,.8),0 0 142px 48px rgba(232,180,90,.52)}}
@keyframes glow-listening{0%,100%{box-shadow:0 0 24px 8px rgba(255,225,150,.7),0 0 54px 19px rgba(232,200,112,.58),0 0 100px 34px rgba(201,168,76,.38)}50%{box-shadow:0 0 34px 12px rgba(255,225,150,.92),0 0 74px 26px rgba(232,200,112,.78),0 0 128px 44px rgba(201,168,76,.5)}}
.olbl{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);font-size:9px;font-family:monospace;letter-spacing:.2em;color:var(--golddim);pointer-events:none}
.olbl.L{color:var(--gold2)}
.olbl.S{color:#f5dfa0}
.agbar{display:flex;gap:3px;padding:5px 8px;background:var(--navy2);border-top:1px solid rgba(201,168,76,.12);overflow-x:auto;scrollbar-width:none}
.agbar::-webkit-scrollbar{display:none}
.atab{padding:3px 8px;border-radius:4px;border:1px solid rgba(201,168,76,.15);background:transparent;color:var(--textdim);font-size:8px;font-family:monospace;letter-spacing:.06em;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0}
.atab:hover,.atab.active{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.08)}
.inparea{padding:10px 12px;background:var(--navy2);border-top:1px solid rgba(201,168,76,.1)}
.tprev{font-size:10px;font-style:italic;color:var(--gold);background:rgba(201,168,76,.07);border-radius:3px;padding:3px 7px;margin-bottom:6px;display:none}
.tprev.show{display:block}
.irow{display:flex;gap:7px;align-items:center}
.mic{width:36px;height:36px;border-radius:50%;flex-shrink:0;border:1.5px solid rgba(201,168,76,.3);background:rgba(201,168,76,.08);color:var(--gold);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.mic.on{border-color:var(--gold2);background:rgba(201,168,76,.2);box-shadow:0 0 12px rgba(201,168,76,.25)}
.txtin{flex:1;background:rgba(201,168,76,.05);border:1px solid rgba(201,168,76,.18);border-radius:6px;padding:8px 12px;color:var(--text);font-size:12px;outline:none;font-family:inherit}
.txtin:focus{border-color:rgba(201,168,76,.45)}
.txtin::placeholder{color:var(--textdim);font-style:italic}
.sndbtn{padding:8px 12px;background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.35);border-radius:6px;color:var(--gold);font-size:9px;font-family:monospace;letter-spacing:.1em;cursor:pointer;white-space:nowrap;flex-shrink:0}
.sndbtn:hover{background:rgba(201,168,76,.2)}
.clipbtn{width:36px;height:36px;border-radius:50%;flex-shrink:0;border:1.5px solid rgba(201,168,76,.3);background:rgba(201,168,76,.08);color:var(--gold);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.clipbtn:hover{border-color:var(--gold2);background:rgba(201,168,76,.16)}
.apreview{display:none;align-items:center;gap:8px;margin-bottom:7px;padding:5px 7px;background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.18);border-radius:6px}
.apreview.show{display:flex}
.apreview img{width:36px;height:36px;object-fit:cover;border-radius:4px;border:1px solid rgba(201,168,76,.25)}
.apname{flex:1;font-size:9px;font-family:monospace;color:var(--textdim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.arm{background:transparent;border:none;color:var(--golddim);font-size:14px;cursor:pointer;padding:2px 5px;line-height:1}
.arm:hover{color:#f87171}
.msgimg{max-width:140px;max-height:140px;border-radius:6px;display:block;margin-top:5px;border:1px solid rgba(201,168,76,.2)}
.sright{background:var(--navy2);border-left:1px solid rgba(201,168,76,.12);display:flex;flex-direction:column;overflow:hidden}
.chdr{padding:8px 10px;border-bottom:1px solid rgba(201,168,76,.08);font-size:8px;font-family:monospace;letter-spacing:.16em;color:var(--golddim);flex-shrink:0}
.msgs{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;scrollbar-width:thin;scrollbar-color:rgba(201,168,76,.2) transparent}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:rgba(201,168,76,.2);border-radius:2px}
.msg{padding:7px 10px;border-radius:7px;font-size:11px;line-height:1.55;animation:fu .2s ease;white-space:pre-wrap}
.msg.n{background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.12);border-bottom-left-radius:2px}
.msg.u{background:rgba(26,74,138,.3);border:1px solid rgba(42,111,212,.2);border-bottom-right-radius:2px;color:#a8c8f0;font-family:monospace;font-size:10px;text-align:right}
.mlbl{font-size:7px;font-family:monospace;letter-spacing:.16em;color:var(--golddim);margin-bottom:3px}
.dots{display:flex;gap:3px;align-items:center;padding:2px 0}
.dots span{display:block;width:5px;height:5px;border-radius:50%;background:var(--gold);animation:kp 1.2s ease infinite}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
.npbar{display:flex;align-items:center;gap:7px;padding:4px 10px;background:rgba(201,168,76,.04);border-top:1px solid rgba(201,168,76,.1);font-size:8px;font-family:monospace;color:var(--golddim);flex-shrink:0}
.nptr{color:var(--gold);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.npb{background:transparent;border:none;color:var(--golddim);cursor:pointer;font-size:11px;padding:1px 3px}
.npb:hover{color:var(--gold)}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}
.ov.open{opacity:1;pointer-events:all}
.mdl{background:var(--navy2);border:1px solid rgba(201,168,76,.35);border-radius:8px;padding:16px;width:280px}
.mdl h3{font-size:11px;font-family:monospace;letter-spacing:.15em;color:var(--gold);margin-bottom:10px}
.mdl input,.mdl select{width:100%;background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.2);border-radius:4px;padding:6px 9px;color:var(--text);font-size:11px;outline:none;margin-bottom:7px;font-family:inherit}
.mbtns{display:flex;gap:6px;justify-content:flex-end}
.mbtns button{padding:5px 10px;border-radius:4px;font-size:9px;font-family:monospace;letter-spacing:.1em;cursor:pointer}
.bcnl{background:transparent;border:1px solid var(--golddim);color:var(--textdim)}
.badd{background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.4);color:var(--gold)}
@keyframes kp{0%,100%{opacity:.35;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
@keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="app">
<div class="header">
  <div><div class="nname">A V A</div><div class="nsub">AUTONOMOUS VIRTUAL ASSISTANT</div></div>
  <div class="hright">
    <span class="spill" id="p-spotify">&#9834; Spotify</span>
    <span class="spill" id="p-gmail">&#10022; Gmail</span>
    <span class="spill" id="p-computer">&#11041; Computer</span>
    <div class="sdot" id="sDot"></div>
    <span class="slbl" id="sLbl">STANDBY</span>
  </div>
</div>
<div class="sleft">
  <div class="ssec g">
    <div class="sslbl">TASK QUEUE</div>
    <div id="taskList"></div>
    <button class="addbtn" onclick="openModal()">+ ADD TASK</button>
  </div>
  <div class="ssec s">
    <div class="sslbl">AVA MEMORY</div>
    <div id="memList"></div>
  </div>
  <div class="ssec">
    <div class="sslbl">WAKE WORD</div>
    <button id="wakeBtn" onclick="toggleWake()" style="width:100%;padding:5px;border-radius:4px;border:1px solid var(--golddim);background:transparent;color:var(--golddim);font-size:9px;font-family:monospace;cursor:pointer;letter-spacing:.1em">ENABLE</button>
  </div>
</div>
<div class="center">
  <div class="owrap">
    <div class="portrait pst-idle" id="portrait">
      <div class="pcrop">
        <div class="ptilt"><div class="pimgwrap"><img class="pimg" id="pimg" src="assets/ava%202.png" alt="AVA"></div></div>
        <div class="ptint"></div>
        <div class="pblink" id="pblink"></div>
      </div>
      <div class="pglow"></div>
    </div>
    <div class="olbl" id="orbLbl">STANDBY</div>
  </div>
  <div class="agbar">
    <button class="atab active" data-a="ava" onclick="setAgent('ava')">AVA</button>
    <button class="atab" data-a="research" onclick="setAgent('research')">RESEARCH</button>
    <button class="atab" data-a="tasks" onclick="setAgent('tasks')">TASKS</button>
    <button class="atab" data-a="code" onclick="setAgent('code')">CODE</button>
    <button class="atab" data-a="system" onclick="setAgent('system')">SYSTEM</button>
    <button class="atab" data-a="email" onclick="setAgent('email')">EMAIL</button>
    <button class="atab" data-a="calendar" onclick="setAgent('calendar')">CALENDAR</button>
    <button class="atab" data-a="music" onclick="setAgent('music')">MUSIC</button>
    <button class="atab" data-a="writing" onclick="setAgent('writing')">WRITING</button>
  </div>
  <div class="inparea">
    <div class="tprev" id="tprev"></div>
    <div class="apreview" id="apreview"></div>
    <input type="file" id="fileIn" accept="image/jpeg,image/png,image/gif,image/webp,video/mp4,video/webm,video/quicktime" style="display:none" onchange="onFilePicked(event)"/>
    <div class="irow">
      <button class="clipbtn" id="clipBtn" onclick="document.getElementById('fileIn').click()" title="Attach image or video">&#128206;</button>
      <button class="mic" id="micBtn" onclick="toggleListen()">&#127897;</button>
      <input class="txtin" id="txtin" placeholder="Ask AVA anything..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"/>
      <button class="sndbtn" onclick="sendMsg()">SEND</button>
    </div>
  </div>
</div>
<div class="sright">
  <div class="chdr">CONVERSATION LOG</div>
  <div class="msgs" id="msgs"></div>
  <div class="npbar" id="npBar" style="display:none">
    <span>&#9835;</span><span class="nptr" id="nptr">Nothing playing</span>
    <button class="npb" onclick="spCtrl('previous')">&#9194;</button>
    <button class="npb" id="npPlay" onclick="spCtrl('toggle')">&#9208;</button>
    <button class="npb" onclick="spCtrl('next')">&#9193;</button>
  </div>
</div>
</div>
<div class="ov" id="ov">
  <div class="mdl">
    <h3>NEW TASK</h3>
    <input id="tIn" placeholder="What needs to be done?" onkeydown="if(event.key==='Enter')addTask()"/>
    <select id="tPri"><option value="h">High priority</option><option value="m" selected>Medium priority</option><option value="l">Low priority</option></select>
    <div class="mbtns"><button class="bcnl" onclick="closeModal()">Cancel</button><button class="badd" onclick="addTask()">Add</button></div>
  </div>
</div>
<script>
var B='https://ava-assistant.com';
var L='http://127.0.0.1:7878';
var K=(window.avaElectron&&window.avaElectron.apiKey)||'';
var AGENTS={ava:{name:"AVA",sys:"You are AVA. Warm, precise, web search enabled, computer control via tray app. Concise, calm authority. If the user asks you to set a reminder or timer (e.g. remind me in 40 minutes, remind me at 3pm), respond with a friendly confirmation AND include this exact tag at the end of your message: [[REMINDER:minutesFromNow:message]]. For example if they say remind me in 40 minutes to check the oven, respond with something like Got it! I will remind you in 40 minutes. [[REMINDER:40:check the oven]]. Only include this tag when they explicitly ask for a reminder or timer."},research:{name:"Research Agent",sys:"Deep research specialist. Web search. Thorough, cite sources."},tasks:{name:"Task Agent",sys:"Task and productivity specialist. Break goals into steps."},code:{name:"Code Agent",sys:"Expert software engineer. Clean code, any language."},system:{name:"System Agent",sys:"Windows PC control via local tray app. Open apps, files, volume, screenshots."},email:{name:"Email Agent",sys:"Gmail specialist. You help draft, reply to, and summarize emails. When the user asks to read their inbox, use the connected Google account via the Railway backend. Write in a clear, professional tone unless asked otherwise. Always confirm before sending anything."},calendar:{name:"Calendar Agent",sys:"Google Calendar specialist. You ARE connected to the user's Google Calendar and CAN create, read, and manage events. To create an event after user confirmation, you MUST end your reply with this exact tag: [[CALENDAR_CREATE:title|start_ISO|end_ISO|description|location]] using ISO 8601 for start/end (e.g. 2026-07-06T10:00:00). Leave description or location blank if unknown. Do not use | in field values. Always confirm details first, then include the tag when confirmed."},music:{name:"Music Agent",sys:"Music and Spotify specialist. Deep knowledge of genres, artists, albums, and music history. Help with Spotify controls, playlist curation, song recommendations, and music discovery. Use the Spotify integration via the local API when available."},writing:{name:"Writing Agent",sys:"Expert writing assistant. Help with creative writing, essays, emails, editing, proofreading, tone adjustment, and any text-based task. Match the user's voice and style. Offer specific improvements, not vague praise."}};
var agent='ava',loading=false,listening=false,wakeOn=false,wakeRec=null,activeRec=null,liveT='',isPlaying=false,pendingAttachment=null;
var MAX_VIDEO_SECONDS=30;

function renderMsgs(){var el=document.getElementById('msgs');var hist=hists[agent];el.innerHTML='';if(!hist.length){el.innerHTML='<div style="text-align:center;color:var(--golddim);font-size:10px;font-family:monospace;margin-top:24px">'+AGENTS[agent].name+' ready.</div>';return;}hist.forEach(function(msg){var d=document.createElement('div');d.className='msg '+(msg.role==='user'?'u':'n');if(msg.role==='assistant'){var l=document.createElement('div');l.className='mlbl';l.textContent=AGENTS[agent].name+' +';d.appendChild(l);}var t=document.createElement('div');var tv=msg.content;if(Array.isArray(tv)){var tb=tv.find(function(b){return b.type==='text'});tv=tb?tb.text:'';}t.textContent=tv;d.appendChild(t);if(msg.preview){var pimg=document.createElement('img');pimg.className='msgimg';pimg.src=msg.preview.url;d.appendChild(pimg);}el.appendChild(d);});if(loading){var d2=document.createElement('div');d2.className='msg n';var l2=document.createElement('div');l2.className='mlbl';l2.textContent=AGENTS[agent].name+' +';d2.appendChild(l2);var dots=document.createElement('div');dots.className='dots';[0,1,2].forEach(function(){var s=document.createElement('span');dots.appendChild(s);});d2.appendChild(dots);el.appendChild(d2);}requestAnimationFrame(function(){el.scrollTop=el.scrollHeight;});}
function renderTasks(){var el=document.getElementById('taskList');if(!tasks.length){el.innerHTML='<div style="font-size:9px;color:var(--golddim);font-family:monospace;text-align:center;padding:4px 0">No tasks</div>';return;}el.innerHTML='';tasks.forEach(function(tk,i){var d=document.createElement('div');d.className='ti';var c=document.createElement('div');c.className='tck'+(tk.done?' done':'');c.textContent=tk.done?'v':'';c.onclick=function(){tasks[i].done=!tasks[i].done;save();renderTasks();};var t=document.createElement('div');t.className='ttx'+(tk.done?' done':'');t.textContent=tk.text;var p=document.createElement('div');p.className='tpr '+tk.pri;p.textContent=tk.pri==='h'?'HIGH':tk.pri==='m'?'MED':'LOW';d.appendChild(c);d.appendChild(t);d.appendChild(p);el.appendChild(d);});}
function renderMems(){var el=document.getElementById('memList');if(!mems.length){el.innerHTML='<div style="font-size:9px;color:var(--golddim);font-family:monospace;text-align:center">No memories</div>';return;}el.innerHTML='';mems.forEach(function(m){var d=document.createElement('div');d.className='mi';d.innerHTML='<b>+</b> '+m;el.appendChild(d);});}
function openModal(){document.getElementById('ov').classList.add('open');document.getElementById('tIn').focus();}
function closeModal(){document.getElementById('ov').classList.remove('open');document.getElementById('tIn').value='';}
function addTask(){var v=document.getElementById('tIn').value.trim();if(!v)return;tasks.unshift({text:v,pri:document.getElementById('tPri').value,done:false,id:Date.now()});save();renderTasks();closeModal();}
if(window.avaElectron){if(window.avaElectron.onVoiceInput)window.avaElectron.onVoiceInput(async function(text){var prevLen=hists[agent].length;await sendMsg(text);var waited=0;while(hists[agent].length<=prevLen&&waited<20000){await new Promise(function(r){setTimeout(r,200)});waited+=200;}var last=hists[agent][hists[agent].length-1];if(last&&last.role==='assistant'&&window.avaElectron.sendVoiceResponse)window.avaElectron.sendVoiceResponse(last.content);});if(window.avaElectron.onVoiceTranscript)window.avaElectron.onVoiceTranscript(function(text){var p=document.getElementById('tprev');p.textContent=text;p.className='tprev show';});if(window.avaElectron.onWakeFromTray)window.avaElectron.onWakeFromTray(function(){if(!listening)startListen();});}
function getDeviceInfo(){var info={type:/Mobi|Android/i.test(navigator.userAgent)?'phone':/Tablet|iPad/i.test(navigator.userAgent)?'tablet':'desktop',platform:navigator.platform,online:navigator.onLine};if(navigator.getBattery){navigator.getBattery().then(function(b){info.battery=Math.round(b.level*100)+'%';window.deviceInfo=info;});}else{window.deviceInfo=info;}return info;}
window.deviceInfo=getDeviceInfo();

scheduleBlink();load();checkSvcs();setSt('idle');
setInterval(fetchNP,30000);setInterval(checkSvcs,60000);
setInterval(async function(){ try{ var r=await fetch(B+"/api/reminders"); var d=await r.json(); var now=Date.now(); (d.reminders||[]).forEach(function(rem){ if(!rem.notified && new Date(rem.dueAt).getTime()<=now){ rem.notified=true; var msg="Reminder: "+rem.message; speakText(msg); hists[agent].push({role:"assistant",content:msg}); renderMsgs(); save(); fetch(B+"/api/reminders/"+rem.id+"/notified",{method:"POST"}).catch(function(){}); } }); }catch(e){} }, 15000);
