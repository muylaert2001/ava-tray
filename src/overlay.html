<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    font-family: 'Segoe UI', system-ui, sans-serif;
    -webkit-app-region: no-drag;
    overflow: hidden;
  }
  .toast {
    background: rgba(10, 2, 28, 0.95);
    border: 1px solid rgba(232, 121, 249, 0.5);
    border-radius: 10px;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: slideIn 0.25s ease;
  }
  .orb {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(124, 58, 237, 0.4);
    border: 1.5px solid rgba(232, 121, 249, 0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    animation: pulse 1s ease-in-out infinite;
  }
  .text { flex: 1; }
  .name {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.2em;
    background: linear-gradient(90deg, #e879f9, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .sub {
    font-size: 10px;
    color: rgba(167, 139, 250, 0.7);
    letter-spacing: 0.12em;
    font-family: monospace;
    margin-top: 2px;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(232, 121, 249, 0.4); }
    50% { box-shadow: 0 0 0 6px rgba(232, 121, 249, 0); }
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
  <div class="toast">
    <div class="orb">💜</div>
    <div class="text">
      <div class="name">A V A</div>
      <div class="sub">I'M LISTENING...</div>
    </div>
  </div>
</body>
</html>
